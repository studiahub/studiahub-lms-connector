services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
      MYSQL_ROOT_PASSWORD: rootpw
    ports:
      # 3307 en el host para no chocar con un MySQL local en 3306.
      # Útil para conectarse desde TablePlus / Sequel Ace / etc.
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 20

  wp:
    image: wordpress:6.8-php8.2-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
    volumes:
      - wp_data:/var/www/html
      - ../plugin/studiahub-lms-connector:/var/www/html/wp-content/plugins/studiahub-lms-connector
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./php.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    extra_hosts:
      # Permite al WP llegar al LMS corriendo en localhost:3000 del host
      - "host.docker.internal:host-gateway"

  wpcli:
    image: wordpress:cli
    profiles: [init]
    depends_on:
      db:
        condition: service_healthy
      wp:
        condition: service_started
    user: "33:33"
    volumes:
      - wp_data:/var/www/html
      - ../plugin/studiahub-lms-connector:/var/www/html/wp-content/plugins/studiahub-lms-connector
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./wp-init.sh:/usr/local/bin/wp-init.sh:ro
    entrypoint: ["bash", "/usr/local/bin/wp-init.sh"]
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
      HOME: /tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data:
  wp_data:
